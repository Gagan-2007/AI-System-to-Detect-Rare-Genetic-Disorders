<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Segoe UI', Arial, sans-serif;
}

body {
  height: 100vh;
  background:
    radial-gradient(circle at top left, rgba(219, 234, 254, 0.42), transparent 28%),
    radial-gradient(circle at bottom right, rgba(255, 243, 214, 0.45), transparent 24%),
    linear-gradient(180deg, #eff4f9 0%, #f8fafc 45%, #eef3f8 100%);
  display: flex;
  justify-content: center;
  align-items: center;
}

.nav-wrap {
  position: fixed;
  top: 22px;
  left: 50%;
  transform: translateX(-50%);
  z-index: 1000;
  width: 100%;
  padding: 0 20px;
  display: flex;
  justify-content: center;
  pointer-events: none;
}

.nav-shell {
  width: min(1020px, 100%);
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 14px;
  pointer-events: auto;
}

.brand-mark {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  height: 46px;
  padding: 0 18px;
  border-radius: 999px;
  background: rgba(255, 255, 255, 0.76);
  border: 1px solid rgba(17, 24, 39, 0.08);
  color: #111827;
  font-size: 16px;
  font-weight: 800;
  letter-spacing: 0.4px;
  white-space: nowrap;
  text-decoration: none;
  backdrop-filter: blur(14px) saturate(140%);
  -webkit-backdrop-filter: blur(14px) saturate(140%);
  box-shadow:
    0 10px 24px rgba(15, 23, 42, 0.08),
    inset 0 1px 0 rgba(255, 255, 255, 0.95);
}

.dynamic-island {
  position: relative;
  display: flex;
  align-items: center;
  justify-content: center;
  min-height: 48px;
  padding: 0 24px;
  border-radius: 999px;
  background: rgba(255, 255, 255, 0.6);
  border: 1px solid rgba(255, 255, 255, 0.82);
  backdrop-filter: blur(18px) saturate(140%);
  -webkit-backdrop-filter: blur(18px) saturate(140%);
  box-shadow:
    0 14px 34px rgba(15, 23, 42, 0.08),
    inset 0 1px 0 rgba(255, 255, 255, 0.96);
}

.nav-right {
  position: relative;
  display: flex;
  align-items: center;
  gap: 24px;
}

.nav-right a {
  position: relative;
  text-decoration: none;
  color: #4b5563;
  font-size: 14px;
  font-weight: 600;
  white-space: nowrap;
  padding: 4px 0;
  transition: color 0.3s ease;
}

.nav-right a:hover,
.nav-right a.active {
  color: #111827;
}

.nav-dot {
  position: absolute;
  bottom: -7px;
  left: 0;
  width: 6px;
  height: 6px;
  background: #111827;
  border-radius: 50%;
  transition: left 0.35s cubic-bezier(0.25, 1, 0.5, 1);
  pointer-events: none;
}

.detect-btn {
  position: relative;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  height: 46px;
  padding: 0 20px;
  border-radius: 999px;
  text-decoration: none;
  white-space: nowrap;
  font-size: 14px;
  font-weight: 700;
  color: #111827;
  background: rgba(255, 255, 255, 0.75);
  border: 1px solid rgba(17, 24, 39, 0.08);
  backdrop-filter: blur(16px) saturate(140%);
  -webkit-backdrop-filter: blur(16px) saturate(140%);
  box-shadow:
    0 10px 26px rgba(15, 23, 42, 0.08),
    inset 0 1px 0 rgba(255, 255, 255, 0.95);
  transition: all 0.28s ease;
}

.detect-btn:hover {
  transform: translateY(-2px);
  background: rgba(255, 255, 255, 0.9);
  box-shadow:
    0 14px 32px rgba(15, 23, 42, 0.12),
    inset 0 1px 0 rgba(255, 255, 255, 1);
}

.detect-btn:active {
  transform: translateY(0);
  box-shadow:
    0 6px 14px rgba(15, 23, 42, 0.08),
    inset 0 1px 0 rgba(255, 255, 255, 0.9);
}

.container {
  margin-top: 120px;
  width: 100%;
  max-width: 340px;
  padding: 60px 30px 40px 30px;
  background: #ffffff;
  border-radius: 24px;
  border: 1px solid #e5e7eb;
  box-shadow: 0 25px 60px rgba(0, 0, 0, 0.15);
}

h2 {
  text-align: center;
  margin-bottom: 8px;
  color: #111827;
  font-weight: 600;
  letter-spacing: 0.5px;
}

.subtitle {
  text-align: center;
  font-size: 13px;
  color: #6b7280;
  margin-bottom: 35px;
}

.input-group {
  margin-bottom: 22px;
}

.input-group label {
  font-size: 13px;
  font-weight: 500;
  display: block;
  margin-bottom: 8px;
  color: #374151;
}

.input-group input[type="email"],
.input-group input[type="password"] {
  width: 100%;
  padding: 12px;
  background: #f9fafb;
  border: 1px solid #d1d5db;
  border-radius: 8px;
  outline: none;
  font-size: 14px;
  color: #111827;
}

.input-group input::placeholder {
  color: #9ca3af;
}

.input-group input[type="email"]:focus,
.input-group input[type="password"]:focus {
  background: #ffffff;
  border-color: #2563eb;
  box-shadow: 0 0 0 2px rgba(37,99,235,0.1);
}

.options {
  display: flex;
  justify-content: space-between;
  font-size: 12px;
  margin-bottom: 30px;
  color: #6b7280;
  gap: 10px;
}

.options a {
  text-decoration: none;
  color: #2563eb;
}

.options a:hover {
  text-decoration: underline;
}

button {
  width: 100%;
  padding: 14px;
  background: rgba(0, 0, 0, 0.45);
  backdrop-filter: blur(18px) saturate(140%);
  -webkit-backdrop-filter: blur(18px) saturate(140%);
  border: 1px solid rgba(255, 255, 255, 0.08);
  color: #ffffff;
  border-radius: 999px;
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.3s ease;
  box-shadow:
    0 6px 20px rgba(0, 0, 0, 0.25),
    inset 0 1px 0 rgba(255, 255, 255, 0.05);
}

button:hover {
  background: rgba(0, 0, 0, 0.6);
  transform: translateY(-2px);
}

.signup {
  text-align: center;
  margin-top: 25px;
  font-size: 13px;
  color: #6b7280;
}

.signup a {
  color: #2563eb;
  text-decoration: none;
  font-weight: 600;
}

.signup a:hover {
  text-decoration: underline;
}

.status-box {
  display: none;
  margin-top: 18px;
  padding: 12px;
  border-radius: 12px;
  background: #f3f4f6;
  border: 1px solid #e5e7eb;
  text-align: center;
}

.status-box p {
  font-size: 13px;
  color: #374151;
  margin-bottom: 10px;
}

.logout-btn {
  background: rgba(0, 0, 0, 0.45);
  color: #ffffff;
  border: none;
  padding: 10px 18px;
  border-radius: 999px;
  cursor: pointer;
  font-size: 13px;
  font-weight: 600;
}

.logout-btn:hover {
  background: rgba(0, 0, 0, 0.6);
}

.user-menu {
  position: relative;
}

.user-btn {
  background: rgba(255,255,255,0.76);
  border: 1px solid rgba(17, 24, 39, 0.08);
  padding: 8px 14px;
  border-radius: 999px;
  color: #111827;
  cursor: pointer;
  font-size: 13px;
  font-weight: 600;
}

.dropdown {
  position: absolute;
  top: 120%;
  right: 0;
  background: rgba(0, 0, 0, 0.45);
  backdrop-filter: blur(18px) saturate(140%);
  -webkit-backdrop-filter: blur(18px) saturate(140%);
  border-radius: 16px;
  padding: 10px;
  display: none;
  min-width: 140px;
  border: 1px solid rgba(255, 255, 255, 0.08);
  box-shadow:
    0 10px 35px rgba(0, 0, 0, 0.45),
    inset 0 1px 0 rgba(255, 255, 255, 0.05);
}

.dropdown button {
  width: 100%;
  background: transparent;
  border: none;
  color: #d7d7d7;
  padding: 10px;
  text-align: left;
  cursor: pointer;
  font-size: 13px;
  border-radius: 8px;
  transition: 0.2s;
}

.dropdown button:hover {
  background: rgba(255, 255, 255, 0.08);
  color: #ffffff;
}

@media (max-width: 1100px) {
  .nav-shell {
    width: min(930px, 100%);
    gap: 10px;
  }

  .dynamic-island {
    padding: 0 18px;
  }

  .nav-right {
    gap: 18px;
  }

  .brand-mark,
  .detect-btn {
    padding: 0 14px;
  }
}

@media (max-width: 900px) {
  .nav-wrap {
    top: 16px;
    padding: 0 12px;
  }

  .nav-shell {
    flex-wrap: wrap;
    justify-content: center;
    gap: 10px;
  }

  .brand-mark {
    order: 1;
  }

  .dynamic-island {
    order: 2;
    width: auto;
    max-width: 100%;
    min-height: 46px;
    padding: 10px 16px;
  }

  .detect-btn {
    order: 3;
  }

  .nav-right {
    justify-content: center;
    gap: 14px;
    flex-wrap: wrap;
  }

  .nav-right a {
    font-size: 13px;
  }
}

@media (max-width: 640px) {
  .brand-mark,
  .detect-btn {
    height: 40px;
    font-size: 12px;
    padding: 0 12px;
  }

  .dynamic-island {
    min-height: 42px;
    padding: 10px 14px;
  }

  .nav-right {
    gap: 12px;
  }

  .nav-right a {
    font-size: 12px;
  }

  .nav-dot {
    bottom: -6px;
    width: 5px;
    height: 5px;
  }
}

@media (max-width: 480px) {
  .container {
    margin-top: 110px;
    padding: 50px 22px 34px 22px;
  }

  .options {
    flex-direction: column;
    align-items: flex-start;
  }
}
</style>
</head>

<body>
<div class="nav-wrap">
  <div class="nav-shell">
    <a href="index.html" class="brand-mark">creAIte</a>

    <nav class="dynamic-island">
      <div class="nav-right" id="navRight">
        <a href="index.html">Home</a>
        <a href="about.html">About Us</a>
        <a href="contact.html">Get in Touch</a>
        <a href="login.html" class="active">Log In</a>
        <div class="nav-dot"></div>
      </div>
    </nav>

    <a href="detect.html" class="detect-btn">Detect Gene Mutation</a>
  </div>
</div>

<div class="container">
  <h2>Login</h2>
  <p class="subtitle">Enter your details</p>

  <form id="loginForm">
    <div class="input-group">
      <label for="email">Email</label>
      <input id="email" type="email" placeholder="Enter your email" required>
    </div>

    <div class="input-group">
      <label for="password">Password</label>
      <input id="password" type="password" placeholder="Enter your password" required>
    </div>

    <div class="options">
      <label style="display: flex; align-items: center; gap: 8px; cursor: pointer;">
        <input id="rememberMe" type="checkbox" style="accent-color: #2563eb;">
        Remember me
      </label>
    </div>

    <button type="submit">Login</button>
  </form>

  <div id="statusBox" class="status-box">
    <p id="statusText"></p>
    <button id="logoutBtn" class="logout-btn" type="button">Logout</button>
  </div>

  <div class="signup">
    Don’t have an account? <a href="signup.html">Sign up</a>
  </div>
</div>

<script>
const loginForm = document.getElementById("loginForm");
const emailInput = document.getElementById("email");
const passwordInput = document.getElementById("password");
const rememberMe = document.getElementById("rememberMe");
const navRight = document.getElementById("navRight");

/* ---------- AUTH ---------- */
function getStoredAuth() {
  return localStorage.getItem("authUser") || sessionStorage.getItem("authUser");
}

function clearAuth() {
  localStorage.removeItem("authUser");
  sessionStorage.removeItem("authUser");
}

/* ---------- DOT MOVEMENT ---------- */
function setupNavDot() {
  const dot = document.querySelector(".nav-dot");
  const links = document.querySelectorAll(".nav-right a");

  function moveDot(el) {
    if (!el || !dot) return;
    const rect = el.getBoundingClientRect();
    const parentRect = el.parentElement.getBoundingClientRect();
    const left = rect.left - parentRect.left + rect.width / 2 - dot.offsetWidth / 2;
    dot.style.left = left + "px";
  }

  links.forEach(link => {
    link.addEventListener("mouseenter", () => moveDot(link));
  });

  const navParent = document.querySelector(".nav-right");
  if (navParent) {
    navParent.addEventListener("mouseleave", () => {
      const active = document.querySelector(".nav-right a.active");
      if (active) moveDot(active);
    });
  }

  const active = document.querySelector(".nav-right a.active");
  if (active) moveDot(active);

  window.addEventListener("resize", () => {
    const activeLink = document.querySelector(".nav-right a.active");
    if (activeLink) moveDot(activeLink);
  });
}

/* ---------- NAV MENU ---------- */
function renderUserMenu(email) {
  navRight.innerHTML = `
    <a href="index.html">Home</a>
    <a href="about.html">About Us</a>
    <a href="contact.html">Get in Touch</a>

    <div class="user-menu">
      <div class="user-btn" onclick="toggleDropdown()">👤 ${email}</div>
      <div class="dropdown" id="dropdownMenu">
        <button onclick="logout()">Logout</button>
      </div>
    </div>

    <div class="nav-dot"></div>
  `;
  setTimeout(setupNavDot, 50);
}

function renderLoginMenu() {
  navRight.innerHTML = `
    <a href="index.html">Home</a>
    <a href="about.html">About Us</a>
    <a href="contact.html">Get in Touch</a>
    <a href="login.html" class="active">Log In</a>
    <div class="nav-dot"></div>
  `;
  setTimeout(setupNavDot, 50);
}

/* ---------- DROPDOWN ---------- */
function toggleDropdown() {
  const menu = document.getElementById("dropdownMenu");
  if (menu) {
    menu.style.display = menu.style.display === "block" ? "none" : "block";
  }
}

/* ---------- LOGOUT ---------- */
function logout() {
  clearAuth();
  renderLoginMenu();
  location.reload();
}

/* ---------- LOAD ---------- */
window.addEventListener("DOMContentLoaded", function () {
  const savedUser = getStoredAuth();

  if (savedUser && navRight) {
    const user = JSON.parse(savedUser);
    renderUserMenu(user.email);
  } else {
    renderLoginMenu();
  }
});

/* ---------- LOGIN ---------- */
loginForm.addEventListener("submit", function (e) {
  e.preventDefault();

  const userData = {
    email: emailInput.value.trim(),
    remember: rememberMe.checked
  };

  clearAuth();

  if (rememberMe.checked) {
    localStorage.setItem("authUser", JSON.stringify(userData));
  } else {
    sessionStorage.setItem("authUser", JSON.stringify(userData));
  }

  renderUserMenu(userData.email);
  passwordInput.value = "";
});
</script>
</body>
</html>
